# =====================================================================
# docker-compose.yml — Container Orchestration
# Visual Resume Editor
#
# Services:
#   app   — Node.js application (built from Dockerfile)
#   nginx — Reverse proxy (serves on port 80, proxies to app:3000)
# =====================================================================

version: '3.8'

services:
  # ── Application Service ──────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume-editor-app
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
    expose:
      - "3000"
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── Nginx Reverse Proxy ─────────────────────────────────────────
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile.nginx
    container_name: resume-editor-app
    ports:
      - "80:80"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - app-network
networks:
  app-network:
    driver: bridge
